name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
        with:
          path: pactia

      - uses: actions/checkout@v4
        with:
          repository: pactia-lang/pactiac
          path: pactiac

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: pactia/package-lock.json

      - name: Build pactiac
        run: npm ci && npm run build
        working-directory: pactiac

      - name: Test pactia
        run: npm ci && npm test
        working-directory: pactia
